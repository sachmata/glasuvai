  #   command: npm run dev -- --host 0.0.0.0
  #   volumes:
  #     - .:/workspace
  #     - node-modules:/workspace/packages/web-client/node_modules
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     - VITE_BB_URL=http://localhost:3001
  #     - VITE_VS_URL=http://localhost:3002
  #     - VITE_IDP_URL=http://localhost:3003
  #   depends_on:
  #     - bulletin-board
  #     - voting-server
  #     - identity-provider
  #   networks:
  #     - glasuvai

volumes:
  cargo-registry:
    name: glasuvai-cargo-registry
  cargo-git:
    name: glasuvai-cargo-git
  cargo-target:
    name: glasuvai-cargo-target
  sccache:
    name: glasuvai-sccache
  # bb-data:
  #   name: glasuvai-bb-data
  # vs-data:
  #   name: glasuvai-vs-data
  # node-modules:
  #   name: glasuvai-node-modules

networks:
  glasuvai:
    name: glasuvai-net
